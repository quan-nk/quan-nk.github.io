project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "data-science/**"
    - "mind-wandering/**"

lang: vi

website:
  title: "Quan Nguyen"
  repo-url: https://github.com/quan-nk/wp-qn47
  search:
    location: sidebar
    type: textbox
  navbar:
    background: dark
    left:
      - text: "Data Science"
        href: data-science/index.qmd
      - text: "Mind Wandering"
        href: mind-wandering/index.qmd
      - text: "Resources"
        href: resources.qmd
      - text: "About"
        href: about.qmd
  sidebar:
    style: docked
    collapse-level: 1
    contents:
      - href: index.qmd
        text: "Home"
      - text: "---"
      - section: "Data Science"
        contents:
          - href: data-science/index.qmd
            text: "Lộ trình học"
          - section: "R Cơ bản"
            contents:
              - data-science/r-fundamentals/index.qmd
          - section: "Thống kê"
            contents:
              - data-science/statistics/index.qmd
          - section: "Trực quan hoá"
            contents:
              - data-science/visualization/index.qmd
          - section: "Dịch tễ & Nhân quả"
            contents:
              - data-science/epi-causal/index.qmd
      - text: "---"
      - section: "Mind Wandering"
        contents:
          - href: mind-wandering/index.qmd
            text: "All Posts"
          - section: "Essays"
            contents:
              - mind-wandering/posts/*.qmd
          - section: "Book Reviews"
            contents:
              - mind-wandering/book-reviews/*.qmd
      - text: "---"
      - href: resources.qmd
        text: "Resources"
      - href: about.qmd
        text: "About"

format:
  html:
    theme: theme-dark.scss
    css: styles.css
    toc: true
    toc-location: right
    toc-depth: 3
    code-fold: true
    link-external-newwindow: true
