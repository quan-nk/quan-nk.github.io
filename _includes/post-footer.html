<div class="post-footer-wrap">

  <!-- Subscribe box — replace YOURNAME with your Buttondown username -->
  <div class="subscribe-box">
    <p class="subscribe-tagline">Nhận bài mới thẳng vào hộp thư.</p>
    <form class="subscribe-form" action="https://buttondown.com/quannk/email" method="POST" target="_blank">
      <input type="email" name="email" placeholder="email của bạn" required>
      <button type="submit">Đăng ký</button>
    </form>
    <small>~2 lần/tháng · không spam · bỏ đăng ký bất cứ lúc nào</small>
  </div>

  <!-- Share section -->
  <div class="share-section">
    <span class="share-label">Chia sẻ bài này — steal my post!</span>
    <div class="share-buttons" id="qn-share-btns"></div>
  </div>

</div>

<script>
(function () {
  var u = encodeURIComponent(location.href);
  var t = encodeURIComponent(document.title);
  var btns = [
    ['Twitter / X', 'X',  'https://twitter.com/intent/tweet?url=' + u + '&text=' + t],
    ['Facebook',    'fb', 'https://www.facebook.com/sharer/sharer.php?u=' + u],
    ['LinkedIn',    'in', 'https://www.linkedin.com/sharing/share-offsite/?url=' + u],
    ['Telegram',    'tg', 'https://t.me/share/url?url=' + u + '&text=' + t],
    ['Email',       '✉',  'mailto:?subject=' + t + '&body=' + u],
  ];
  var c = document.getElementById('qn-share-btns');
  if (!c) return;
  btns.forEach(function (b) {
    var a = document.createElement('a');
    a.href = b[2]; a.target = '_blank'; a.rel = 'noopener noreferrer';
    a.className = 'share-btn'; a.title = b[0]; a.textContent = b[1];
    c.appendChild(a);
  });
})();
</script>
