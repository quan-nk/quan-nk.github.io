<button id="lang-toggle-btn" aria-label="Toggle language"></button>
<script>
(function(){
  function init() {
    var btn = document.getElementById('lang-toggle-btn');
    if (!btn) return;
    var lang = document.documentElement.getAttribute('data-lang') || 'vi';
    btn.textContent = lang === 'vi' ? '\uD83C\uDDFA\uD83C\uDDF8' : '\uD83C\uDDFB\uD83C\uDDF3';
    btn.title = lang === 'vi' ? 'Switch to English' : 'Chuyển sang Tiếng Việt';
    btn.addEventListener('click', function(){
      var next = document.documentElement.getAttribute('data-lang') === 'vi' ? 'en' : 'vi';
      document.documentElement.setAttribute('data-lang', next);
      localStorage.setItem('site-lang', next);
      btn.textContent = next === 'vi' ? '\uD83C\uDDFA\uD83C\uDDF8' : '\uD83C\uDDFB\uD83C\uDDF3';
      btn.title = next === 'vi' ? 'Switch to English' : 'Chuyển sang Tiếng Việt';
    });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
