<div id="lang-switcher" aria-label="Language switcher">
  <span id="lang-label">Language options</span>
  <button id="lang-btn-vi" data-lang="vi" aria-label="Tiếng Việt" title="Tiếng Việt">&#x1F1FB;&#x1F1F3;</button>
  <button id="lang-btn-en" data-lang="en" aria-label="English" title="English">&#x1F1FA;&#x1F1F8;</button>
</div>
<script>
(function(){
  function setLang(lang) {
    document.documentElement.setAttribute('data-lang', lang);
    localStorage.setItem('site-lang', lang);
    var vi = document.getElementById('lang-btn-vi');
    var en = document.getElementById('lang-btn-en');
    if (!vi || !en) return;
    vi.classList.toggle('lang-active', lang === 'vi');
    en.classList.toggle('lang-active', lang === 'en');
  }

  function init() {
    var lang = document.documentElement.getAttribute('data-lang') || 'vi';
    setLang(lang);
    var vi = document.getElementById('lang-btn-vi');
    var en = document.getElementById('lang-btn-en');
    if (vi) vi.addEventListener('click', function(){ setLang('vi'); });
    if (en) en.addEventListener('click', function(){ setLang('en'); });
  }

  /* Fix: mailto: links must not have target="_blank" or the OS email
     client won't open. This patches the footer share button without
     touching the footer's own code. */
  function fixMailto() {
    document.querySelectorAll('a[href^="mailto:"]').forEach(function(a) {
      a.removeAttribute('target');
      a.removeAttribute('rel');
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function(){ init(); fixMailto(); });
  } else {
    init();
    fixMailto();
  }
})();
</script>
